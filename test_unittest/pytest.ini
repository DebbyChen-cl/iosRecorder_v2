[pytest]
# ── Test discovery ───────────────────────────────────────────
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ───────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --reportportal

# ── Custom markers ───────────────────────────────────────────
markers =
    smoke:    Fast, high-confidence sanity checks
    regression: Full regression suite
    slow:     Tests that take more than 30 seconds
    unit:     Isolated unit tests with no device required

# ── Logging ──────────────────────────────────────────────────
log_cli       = true
log_cli_level = INFO
log_format    = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %H:%M:%S

# ── ReportPortal ─────────────────────────────────────────────
# Fill in your ReportPortal server details before running.
# Alternatively set as environment variables:
#   RP_API_KEY, RP_ENDPOINT, RP_PROJECT, RP_LAUNCH
rp_api_key               = MyEdit-API_KzrjGo7QSiqwIPYpsy7k1P7WNgLoZKfkmqUXFviF6tDq3KDqAzeEomrrOMhNtn7G
rp_endpoint              = http://192.168.7.85:8787
rp_project               = default_personal
rp_launch                = iOS Recorder Unit Tests
rp_launch_attributes     = 'platform:iOS; automation:Appium'
rp_log_batch_size        = 20
rp_log_batch_payload_size = 65000
rp_hierarchy_dirs        = true
# Uncomment to keep the launch open for manual finish:
# rp_launch_id            = EXISTING_LAUNCH_UUID
