[pytest]
testpaths = test_unittest pytest/tests
norecursedirs = export __pycache__ .git .venv
pythonpath = . pytest
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: pure unit tests — no server or device required
    integration: integration tests — require live recorder server and WDA device

addopts =
    -v
    --tb=short
